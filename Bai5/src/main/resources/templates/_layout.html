<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">

    <!-- Title pattern -->
    <title layout:title-pattern="$CONTENT_TITLE | Bài 5_QLSP JPA">
        Bài 5_QLSP JPA
    </title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f5f6f8;
        }

        .navbar {
            background: #212529;
        }

        .navbar-brand {
            font-weight: 600;
        }

        footer {
            background: #ffffff;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container-fluid px-4">

        <a class="navbar-brand" th:href="@{/products}">
            <i class="bi bi-house-door"></i> Home
        </a>

        <div class="ms-auto">
            <a th:href="@{/products}" class="btn btn-outline-light btn-sm me-2">
                <i class="bi bi-box"></i> Products
            </a>

            <a th:href="@{/products/add}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg"></i> Create New Product
            </a>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<main class="container py-4">
    <div layout:fragment="content"></div>
</main>

<!-- FOOTER -->
<footer class="text-center py-3 border-top mt-4 bg-white">
    <small class="text-muted">
        © 2026 - Phát triển ứng dụng với J2EE
    </small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
