<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Products</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container-fluid mt-4">

  <!-- ===== HEADER ===== -->
  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>
      <nav style="--bs-breadcrumb-divider: '>';">
        <ol class="breadcrumb mb-1">
          <li class="breadcrumb-item">

          </li>
          <li class="breadcrumb-item active">Products</li>
        </ol>
      </nav>

      <h4 class="fw-bold mb-0">Products</h4>
    </div>

    <a th:href="@{/products/add}" class="btn btn-primary">
      + Create New Product
    </a>
  </div>

  <!-- ===== TABLE CARD ===== -->
  <div class="card shadow-sm">
    <div class="card-body p-0">

      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">

          <thead class="table-light">
          <tr>
            <th style="width:60px;">#</th>
            <th>Name</th>
            <th style="width:180px;">Image</th>
            <th style="width:120px;">Price</th>
            <th style="width:160px;">Category</th>
            <th style="width:160px;" class="text-end">Action</th>
          </tr>
          </thead>

          <tbody>
          <tr th:each="product : ${products}">
            <td th:text="${product.id}" class="fw-bold"></td>

            <td th:text="${product.name}"></td>

            <td>
              <img th:src="${product.image != null && product.image != '' ? product.image : 'https://picsum.photos/200'}"
                   class="img-thumbnail"
                   style="height:80px; width:120px; object-fit:cover;">
            </td>

            <td class="fw-semibold"
                th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' ₫'">
            </td>

            <td>
                            <span class="badge bg-secondary"
                                  th:text="${product.category != null ? product.category.name : 'N/A'}">
                            </span>
            </td>

            <td class="text-end">
              <a th:href="@{/products/edit/{id}(id=${product.id})}"
                 class="btn btn-sm btn-secondary me-1">
                Edit
              </a>

              <a th:href="@{/products/delete/{id}(id=${product.id})}"
                 onclick="return confirm('Are you sure?')"
                 class="btn btn-sm btn-danger">
                Delete
              </a>
            </td>
          </tr>
          </tbody>

        </table>
      </div>

    </div>
  </div>

</div>

</body>
</html>
